name: Publish Images

on:
  push:
    branches:
      - master
    tags:
      - "*"
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - vanilla
          - ldm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"
          tags="${image}:${{ matrix.target }}-${short_sha}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "master" ]]; then
            tags="${tags}"$'\n'"${image}:${{ matrix.target }}"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags="${tags}"$'\n'"${image}:${{ matrix.target }}-${GITHUB_REF_NAME}"
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            printf '%s\n' "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          pull: true
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  make-ghcr-public:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Detect GHCR visibility token
        id: ghcr-token
        env:
          GHCR_ADMIN_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${GHCR_ADMIN_TOKEN}" ]]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Warn when GHCR visibility token is missing
        if: ${{ steps.ghcr-token.outputs.configured == 'false' }}
        run: |
          echo "GHCR_ADMIN_TOKEN is not configured, so the workflow cannot mark the GHCR package public." >&2

      - name: Mark GHCR package public
        if: ${{ steps.ghcr-token.outputs.configured == 'true' }}
        env:
          GHCR_ADMIN_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          api_root="https://api.github.com"
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          package_name="${repo,,}"

          owner_type="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GHCR_ADMIN_TOKEN}" \
              "${api_root}/users/${owner}" |
            python3 -c 'import json, sys; print(json.load(sys.stdin)["type"])'
          )"

          if [[ "${owner_type}" == "Organization" ]]; then
            package_endpoint="${api_root}/orgs/${owner}/packages/container/${package_name}"
            visibility_endpoint="${package_endpoint}/visibility"
          else
            package_endpoint="${api_root}/users/${owner}/packages/container/${package_name}"
            visibility_endpoint="${api_root}/user/packages/container/${package_name}/visibility"
          fi

          current_visibility="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GHCR_ADMIN_TOKEN}" \
              "${package_endpoint}" |
            python3 -c 'import json, sys; print(json.load(sys.stdin)["visibility"])'
          )"

          if [[ "${current_visibility}" == "public" ]]; then
            echo "GHCR package is already public."
            exit 0
          fi

          curl -fsSL \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GHCR_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            "${visibility_endpoint}" \
            --data '{"visibility":"public"}'
