stages:
  - publish

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2

default:
  image: docker:29-cli
  tags:
    - "instance-runner"
    - "linux"
  services:
    - name: docker:29-dind
      alias: docker
      command:
        - --tls=false
  before_script:
    - |
      set -eu
      if ! command -v glab >/dev/null 2>&1; then
        apk add --no-cache glab ca-certificates
      fi

      docker_ready() {
        docker info >/dev/null 2>&1
      }

      configure_registry_ca() {
        registry_host="${CI_REGISTRY#http://}"
        registry_host="${registry_host#https://}"
        registry_host="${registry_host%%/*}"
        cert_path="${CI_PROJECT_DIR}/.gitlab/buildkit/certs/registry-ca.pem"

        mkdir -p .gitlab/buildkit/certs

        if glab auth login --job-token "$CI_JOB_TOKEN" --hostname "$CI_SERVER_FQDN" --api-protocol "$CI_SERVER_PROTOCOL" >/dev/null 2>&1 \
          && glab -R "$CI_PROJECT_PATH" securefile download --name j6gitlab.pem --path "$cert_path" >/dev/null 2>&1; then
          echo "Using secure file j6gitlab.pem for ${registry_host}"
        elif [ -n "${CI_REGISTRY_CA_CERT:-}" ]; then
          printf '%s\n' "$CI_REGISTRY_CA_CERT" > "$cert_path"
          echo "Using CI_REGISTRY_CA_CERT for ${registry_host}"
        elif [ -n "${CI_SERVER_TLS_CA_FILE:-}" ] && [ -f "${CI_SERVER_TLS_CA_FILE}" ]; then
          cp "${CI_SERVER_TLS_CA_FILE}" "$cert_path"
          echo "Using CI_SERVER_TLS_CA_FILE for ${registry_host}"
        else
          return 1
        fi

        if command -v update-ca-certificates >/dev/null 2>&1; then
          mkdir -p /usr/local/share/ca-certificates
          cp "$cert_path" /usr/local/share/ca-certificates/ci-registry-ca.crt
          update-ca-certificates
        fi

        printf '[registry."%s"]\n  ca = ["%s"]\n' \
          "${registry_host}" "${cert_path}" > .gitlab/buildkit/buildkitd.toml
        return 0
      }

      if getent hosts docker >/dev/null 2>&1; then
        export DOCKER_HOST="tcp://docker:2375"
        export DOCKER_TLS_CERTDIR=""
        echo "Using docker:dind service at ${DOCKER_HOST}"

        tries=0
        until docker_ready; do
          tries=$((tries + 1))
          if [ "$tries" -ge 30 ]; then
            echo "docker:dind did not become ready; trying runner local Docker daemon"
            unset DOCKER_HOST DOCKER_TLS_CERTDIR DOCKER_TLS_VERIFY DOCKER_CERT_PATH || true
            break
          fi
          sleep 2
        done
      else
        unset DOCKER_HOST DOCKER_TLS_CERTDIR DOCKER_TLS_VERIFY DOCKER_CERT_PATH || true
        echo "Using runner local Docker daemon"
      fi

      if ! docker_ready; then
        echo "No reachable Docker daemon found via docker:dind or runner local Docker"
        exit 1
      fi
    - docker info
    - |
      set -eu
      if configure_registry_ca; then
        docker buildx create --use --driver docker-container --buildkitd-config .gitlab/buildkit/buildkitd.toml
      else
        echo "No custom registry CA configured; using default trust store"
        docker buildx create --use --driver docker-container
      fi
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
    - docker buildx inspect --bootstrap

publish:
  stage: publish
  tags:
    - "instance-runner"
    - "linux"
  parallel:
    matrix:
      - TARGET: vanilla
      - TARGET: ldm
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - |
      set -eu

      image="$CI_REGISTRY_IMAGE"
      short_sha="$(printf '%s' "$CI_COMMIT_SHA" | cut -c1-7)"
      tags="--tag ${image}:${TARGET}-${short_sha}"

      if [ "${CI_COMMIT_BRANCH:-}" = "$CI_DEFAULT_BRANCH" ]; then
        tags="$tags --tag ${image}:${TARGET}"
      fi

      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        tags="$tags --tag ${image}:${TARGET}-${CI_COMMIT_TAG}"
      fi

      eval "docker buildx build --pull --target ${TARGET} ${tags} --push ."
