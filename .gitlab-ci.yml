stages:
  - publish

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2

default:
  image: docker:29-cli
  tags:
    - "instance-runner"
    - "linux"
  services:
    - name: docker:29-dind
      alias: docker
      command:
        - --tls=false
  before_script:
    - |
      set -eu
      docker_ready() {
        docker info >/dev/null 2>&1
      }

      if getent hosts docker >/dev/null 2>&1; then
        export DOCKER_HOST="tcp://docker:2375"
        export DOCKER_TLS_CERTDIR=""
        echo "Using docker:dind service at ${DOCKER_HOST}"

        tries=0
        until docker_ready; do
          tries=$((tries + 1))
          if [ "$tries" -ge 30 ]; then
            echo "docker:dind did not become ready; trying runner local Docker daemon"
            unset DOCKER_HOST DOCKER_TLS_CERTDIR DOCKER_TLS_VERIFY DOCKER_CERT_PATH || true
            break
          fi
          sleep 2
        done
      else
        unset DOCKER_HOST DOCKER_TLS_CERTDIR DOCKER_TLS_VERIFY DOCKER_CERT_PATH || true
        echo "Using runner local Docker daemon"
      fi

      if ! docker_ready; then
        echo "No reachable Docker daemon found via docker:dind or runner local Docker"
        exit 1
      fi
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
    - docker buildx create --use --driver docker-container
    - docker buildx inspect --bootstrap

publish:
  stage: publish
  tags:
    - "instance-runner"
    - "linux"
  parallel:
    matrix:
      - TARGET: vanilla
      - TARGET: ldm
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - |
      set -eu

      image="$CI_REGISTRY_IMAGE"
      short_sha="$(printf '%s' "$CI_COMMIT_SHA" | cut -c1-7)"
      tags="--tag ${image}:${TARGET}-${short_sha}"

      if [ "${CI_COMMIT_BRANCH:-}" = "$CI_DEFAULT_BRANCH" ]; then
        tags="$tags --tag ${image}:${TARGET}"
      fi

      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        tags="$tags --tag ${image}:${TARGET}-${CI_COMMIT_TAG}"
      fi

      eval "docker buildx build --pull --target ${TARGET} ${tags} --push ."
