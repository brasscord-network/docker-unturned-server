---
services:
  server:
    image: "unturned-docker:vanilla"
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27016:27016/tcp"
      - "27016:27016/udp"
    stdin_open: true
    tty: true
    environment:
      SERVER_ID: server
      UPDATE_ON_START: "true"
      WORKSHOP_FILE_IDS: ""
    volumes:
      - data:/home/steam/Unturned
    restart: unless-stopped

volumes:
  data: