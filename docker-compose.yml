---
volumes:
  data:

services:
  server:
    image: "unturned-docker:latest"
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "27015:27015"
      - "27016:27016"
    volumes:
      - data:/home/steam/Unturned
    restart: unless-stopped
    stdin_open: true
    tty: true
