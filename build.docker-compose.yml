---
services:
  server:
    image: "docker-unturned-server:vanilla"
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27016:27016/tcp"
      - "27016:27016/udp"
    build:
      context: .
      dockerfile: Dockerfile
      target: vanilla
    stdin_open: true
    tty: true
    # Docker 29.4.2 SteamCMD workaround:
    # 1. Run ./scripts/generate-steamcmd-seccomp-profile.sh ./steamcmd-seccomp.json
    # 2. Uncomment the lines below.
    # security_opt:
    #   - seccomp=./steamcmd-seccomp.json
    environment:
      SERVER_ID: server
      UPDATE_ON_START: "false"
      WORKSHOP_FILE_IDS: ""
    volumes:
      - data:/home/steam/Unturned
    # Switch to the LDM variant by changing the image tag and build target to `ldm`.
    # command: ["-SomeUnturnedArg"]
    restart: unless-stopped

volumes:
  data:
