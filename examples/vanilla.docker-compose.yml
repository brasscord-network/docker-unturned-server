---
services:
  server:
    image: ghcr.io/brasscord-network/docker-unturned-server:vanilla
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27016:27016/tcp"
      - "27016:27016/udp"
    stdin_open: true
    tty: true
    pull_policy: weekly
    # Docker 29.4.2 SteamCMD workaround:
    # 1. Run ./scripts/generate-steamcmd-seccomp-profile.sh ./steamcmd-seccomp.json
    # 2. Uncomment the lines below after copying this file to your host.
    # security_opt:
    #   - seccomp=./steamcmd-seccomp.json
    environment:
      SERVER_ID: server
      UPDATE_ON_START: "false"
      WORKSHOP_FILE_IDS: ""
    volumes:
      - data:/home/steam/Unturned
    restart: unless-stopped

volumes:
  data:
